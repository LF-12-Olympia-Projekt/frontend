name: SSH Test

on:
  push:
    branches:
      - master

jobs:
  ssh-test:
    runs-on: ubuntu-latest

    steps:
      - name: SSH connection test
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            whoami
            pwd
            echo "SSH LOGIN OK"
